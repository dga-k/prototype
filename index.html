<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prototype App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-lg w-full max-w-md p-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-1">📝 รายการสิ่งที่ต้องทำ</h1>
      <p class="text-sm text-gray-500 mb-6">To-Do List</p>

      <!-- Input Area -->
      <div class="flex gap-2 mb-6">
        <input
          id="taskInput"
          type="text"
          placeholder="เพิ่มรายการใหม่..."
          class="flex-1 border border-gray-300 rounded-lg px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400"
        />
        <button
          onclick="addTask()"
          class="bg-indigo-500 hover:bg-indigo-600 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors"
        >
          เพิ่ม
        </button>
      </div>

      <!-- Filter Tabs -->
      <div class="flex gap-2 mb-4 text-sm">
        <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-3 py-1 rounded-full bg-indigo-500 text-white font-medium">ทั้งหมด</button>
        <button onclick="setFilter('active')" id="filter-active" class="filter-btn px-3 py-1 rounded-full text-gray-500 hover:bg-gray-100 font-medium">ยังไม่เสร็จ</button>
        <button onclick="setFilter('done')" id="filter-done" class="filter-btn px-3 py-1 rounded-full text-gray-500 hover:bg-gray-100 font-medium">เสร็จแล้ว</button>
      </div>

      <!-- Task List -->
      <ul id="taskList" class="space-y-2"></ul>

      <!-- Empty State -->
      <div id="emptyState" class="text-center py-10 text-gray-400 hidden">
        <div class="text-4xl mb-2">🗒️</div>
        <p class="text-sm">ยังไม่มีรายการ</p>
      </div>

      <!-- Footer Stats -->
      <div class="mt-6 pt-4 border-t border-gray-100 flex justify-between text-xs text-gray-400">
        <span id="statsLeft"></span>
        <button onclick="clearDone()" class="hover:text-red-400 transition-colors">ลบรายการที่เสร็จแล้ว</button>
      </div>
    </div>

    <script>
      let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
      let filter = 'all';

      function save() {
        localStorage.setItem('tasks', JSON.stringify(tasks));
      }

      function addTask() {
        const input = document.getElementById('taskInput');
        const text = input.value.trim();
        if (!text) return;
        tasks.push({ id: Date.now(), text, done: false });
        input.value = '';
        save();
        render();
      }

      function toggleTask(id) {
        const task = tasks.find(t => t.id === id);
        if (task) task.done = !task.done;
        save();
        render();
      }

      function deleteTask(id) {
        tasks = tasks.filter(t => t.id !== id);
        save();
        render();
      }

      function clearDone() {
        tasks = tasks.filter(t => !t.done);
        save();
        render();
      }

      function setFilter(f) {
        filter = f;
        document.querySelectorAll('.filter-btn').forEach(btn => {
          btn.className = 'filter-btn px-3 py-1 rounded-full text-gray-500 hover:bg-gray-100 font-medium';
        });
        const active = document.getElementById('filter-' + f);
        active.className = 'filter-btn px-3 py-1 rounded-full bg-indigo-500 text-white font-medium';
        render();
      }

      function render() {
        const list = document.getElementById('taskList');
        const empty = document.getElementById('emptyState');
        const statsLeft = document.getElementById('statsLeft');

        let visible = tasks;
        if (filter === 'active') visible = tasks.filter(t => !t.done);
        if (filter === 'done') visible = tasks.filter(t => t.done);

        list.innerHTML = '';
        visible.forEach(task => {
          const li = document.createElement('li');
          li.className = 'flex items-center gap-3 p-3 rounded-xl border border-gray-100 hover:border-indigo-100 hover:bg-indigo-50 transition-colors group';
          li.innerHTML = `
            <button onclick="toggleTask(${task.id})"
              class="w-5 h-5 flex-shrink-0 rounded-full border-2 flex items-center justify-center transition-colors
                ${task.done ? 'bg-green-400 border-green-400 text-white' : 'border-gray-300 hover:border-indigo-400'}">
              ${task.done ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>' : ''}
            </button>
            <span class="flex-1 text-sm ${task.done ? 'line-through text-gray-400' : 'text-gray-700'}">${escapeHtml(task.text)}</span>
            <button onclick="deleteTask(${task.id})"
              class="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-400 transition-all text-lg leading-none">
              &times;
            </button>
          `;
          list.appendChild(li);
        });

        const isEmpty = visible.length === 0;
        empty.classList.toggle('hidden', !isEmpty);
        list.classList.toggle('hidden', isEmpty);

        const remaining = tasks.filter(t => !t.done).length;
        statsLeft.textContent = `เหลือ ${remaining} รายการ`;
      }

      function escapeHtml(text) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(text));
        return d.innerHTML;
      }

      // Allow pressing Enter to add a task
      document.getElementById('taskInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') addTask();
      });

      render();
    </script>
  </body>
</html>
